<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reminder Management System API</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f7fc;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-bottom:10px;
}

.status{
text-align:center;
color:green;
font-weight:bold;
margin-bottom:20px;
}

.endpoint{
background:#eef2ff;
padding:12px;
margin:8px 0;
border-radius:6px;
}

button{
display:block;
margin:20px auto;
padding:10px 20px;
border:none;
border-radius:5px;
cursor:pointer;
background:#4f46e5;
color:white;
}

#message{
text-align:center;
font-weight:bold;
margin-top:15px;
}
</style>

</head>
<body>

<div class="container">

<h1>🚀 Reminder Management System API</h1>

<p class="status">API is Live Successfully</p>

<h2>Available Endpoints</h2>

<div class="endpoint">POST /api/reminder/register/</div>
<div class="endpoint">POST /api/token/</div>
<div class="endpoint">POST /api/token/refresh/</div>
<div class="endpoint">GET /api/reminder/</div>
<div class="endpoint">POST /api/reminder/</div>

<button onclick="checkAPI()">Check Backend Connection</button>

<p id="message"></p>

</div>

<script>
function checkAPI(){
document.getElementById("message").innerHTML =
"✅ Backend Connected Successfully";
}
</script>

</body>
</html>
